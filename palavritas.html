<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palavritas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
            z-index: 0;
        }
        .bg-circle:nth-child(1) { width: 200px; height: 200px; top: -50px; left: -50px; animation: float 8s ease-in-out infinite; }
        .bg-circle:nth-child(2) { width: 150px; height: 150px; bottom: -30px; right: -30px; animation: float 10s ease-in-out infinite reverse; }
        .bg-circle:nth-child(3) { width: 100px; height: 100px; top: 40%; left: 80%; animation: float 7s ease-in-out infinite; }
        .bg-circle:nth-child(4) { width: 180px; height: 180px; top: 60%; left: -40px; animation: float 9s ease-in-out infinite reverse; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.6s ease;
        }

        .game-header {
            text-align: center;
            margin-bottom: 8px;
            margin-top: 10px;
        }

        .game-header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 4px;
        }

        .game-date {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            font-weight: 700;
        }

        /* === GRID === */
        .grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .tile {
            width: 58px;
            height: 58px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: #fff;
            text-transform: uppercase;
            transition: transform 0.1s;
            background: rgba(255,255,255,0.08);
        }

        .tile.filled {
            border-color: rgba(255,255,255,0.6);
            animation: popTile 0.1s ease;
        }

        .tile.current-row {
            border-color: rgba(255,255,255,0.5);
        }

        @keyframes popTile {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes flipIn {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .tile.reveal {
            animation: flipIn 0.5s ease;
        }

        .tile.correct {
            background: #2ecc71;
            border-color: #2ecc71;
        }

        .tile.present {
            background: #f1c40f;
            border-color: #f1c40f;
        }

        .tile.absent {
            background: #7f8c8d;
            border-color: #7f8c8d;
        }

        /* === MESSAGE === */
        .message {
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .message-text {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 8px 20px;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            color: #764ba2;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: none;
        }

        .message-text.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .message-text.error { color: #e74c3c; }
        .message-text.win { color: #2ecc71; }

        /* === KEYBOARD === */
        .keyboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 12px;
        }

        .keyboard-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .key-btn {
            min-width: 34px;
            height: 50px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.95);
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            color: #764ba2;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .key-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .key-btn.wide {
            min-width: 58px;
            font-size: 0.8rem;
        }

        .key-btn.correct {
            background: #2ecc71;
            color: #fff;
        }

        .key-btn.present {
            background: #f1c40f;
            color: #fff;
        }

        .key-btn.absent {
            background: #7f8c8d;
            color: #fff;
        }

        /* === BUTTONS === */
        .game-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .game-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        .game-btn.share { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .game-btn.back { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }
        .game-btn.new-game { background: linear-gradient(135deg, #3498db, #2980b9); }

        /* === RESULT OVERLAY === */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .result-overlay.active {
            display: flex;
        }

        .result-card {
            background: #fff;
            border-radius: 24px;
            padding: 36px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .result-card .result-icon {
            font-size: 3.5rem;
            margin-bottom: 8px;
        }

        .result-card h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .result-card h2.win-text { color: #2ecc71; }
        .result-card h2.lose-text { color: #e74c3c; }

        .result-card p {
            color: #666;
            font-size: 1rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-card .share-preview {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 1.2rem;
            line-height: 1.5;
            white-space: pre-line;
            text-align: center;
        }

        .result-card .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .result-card .game-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
        }

        .copied-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            z-index: 200;
            display: none;
        }

        .copied-toast.visible {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .row.shake {
            animation: shake 0.4s ease;
        }

        @media (max-width: 400px) {
            .tile { width: 50px; height: 50px; font-size: 1.5rem; }
            .key-btn { min-width: 28px; height: 44px; font-size: 0.85rem; padding: 0 5px; }
            .key-btn.wide { min-width: 46px; }
            .game-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>

    </div>

        // ====== STATE ======
        const MAX_ATTEMPTS = 6;

        let targetWord = '';

        // ====== UI REFS ======
        const gridEl = document.getElementById('grid');

        const messageEl = document.getElementById('message');
        const resultOverlay = document.getElementById('result-overlay');

        // ====== DATE ======
        function getTodayString() {
            const d = new Date();
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getDayIndex() {
            const now = new Date();
            const start = new Date(2024, 0, 1);
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function getDailyWord() {
            const idx = getDayIndex() % ANSWER_WORDS.length;
            return ANSWER_WORDS[idx].toUpperCase();
        }

        // ====== INIT ======
        function initGame() {
            document.getElementById('game-date').textContent = getTodayString();
            targetWord = getDailyWord();
            isDaily = true;
            currentRow = 0;
            currentCol = 0;
            currentGuess = '';
            guesses = [];
            gameOver = false;
            gameWon = false;
            keyStates = {};
            buildGrid();
            buildKeyboard();
            hideMessage();
        }

        function newRandomGame() {
            const idx = Math.floor(Math.random() * ANSWER_WORDS.length);
            targetWord = ANSWER_WORDS[idx].toUpperCase();
            isDaily = false;
            currentRow = 0;
            currentCol = 0;
            currentGuess = '';
            guesses = [];
            gameOver = false;
            gameWon = false;
            keyStates = {};
            document.getElementById('game-date').textContent = 'Modo livre';
            buildGrid();
            buildKeyboard();
            hideMessage();
        }

        // ====== GRID ======
        function buildGrid() {
            gridEl.innerHTML = '';
            for (let r = 0; r < MAX_ATTEMPTS; r++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.id = `row-${r}`;
                for (let c = 0; c < WORD_LENGTH; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                gridEl.appendChild(row);
            }
        }

        // ====== KEYBOARD ======
        function buildKeyboard() {
            keyboardEl.innerHTML = '';
            const rows = [
                ['Q','W','E','R','T','Y','U','I','O','P'],
                ['A','S','D','F','G','H','J','K','L'],
                ['ENTER','Z','X','C','V','B','N','M','⌫']
            ];
            for (const row of rows) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                for (const key of row) {
                    const btn = document.createElement('button');
                    btn.className = 'key-btn';
                    if (key === 'ENTER' || key === '⌫') btn.classList.add('wide');
                    btn.textContent = key;
                    btn.dataset.key = key;
                    btn.onclick = () => handleKey(key);
                    if (keyStates[key]) {
                        btn.classList.add(keyStates[key]);
                    }
                    rowDiv.appendChild(btn);
                }
                keyboardEl.appendChild(rowDiv);
            }
        }

        // ====== INPUT ======
        function handleKey(key) {
            if (gameOver) return;

            if (key === '⌫' || key === 'BACKSPACE') {
                deleteLetter();
            } else if (key === 'ENTER') {
                submitGuess();
            } else if (/^[A-Z]$/.test(key)) {
                addLetter(key);
            }
        }

        function addLetter(letter) {
            if (currentCol >= WORD_LENGTH) return;
            currentGuess += letter;
            const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
            tile.textContent = letter;
            tile.classList.add('filled');
            currentCol++;
        }

        function deleteLetter() {
            if (currentCol <= 0) return;
            currentCol--;
            currentGuess = currentGuess.slice(0, -1);
            const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
            tile.textContent = '';
            tile.classList.remove('filled');
        }

        function isValidWord(word) {
            const lower = word.toLowerCase();
            return VALID_WORDS.includes(lower) || ANSWER_WORDS.includes(lower);
        }

        function submitGuess() {
            if (currentCol < WORD_LENGTH) {
                showMessage('Palavra incompleta!', 'error');
                shakeRow(currentRow);
                return;
            }

            if (!isValidWord(currentGuess)) {
                showMessage('Palavra nao encontrada!', 'error');
                shakeRow(currentRow);
                return;
            }

            const result = evaluateGuess(currentGuess, targetWord);
            guesses.push({ word: currentGuess, result });

            revealRow(currentRow, result);

            if (currentGuess === targetWord) {
                gameOver = true;
                gameWon = true;
                const msgs = ['Genial!', 'Magnifico!', 'Impressionante!', 'Muito bem!', 'Boa!', 'Por pouco!'];
                setTimeout(() => {
                    showMessage(msgs[currentRow] || 'Parabens!', 'win');
                    setTimeout(() => showResult(), 1200);
                }, WORD_LENGTH * 300 + 200);
            } else if (currentRow >= MAX_ATTEMPTS - 1) {
                gameOver = true;
                gameWon = false;
                setTimeout(() => {
                    showMessage(`A palavra era: ${targetWord}`, 'error');
                    setTimeout(() => showResult(), 1200);
                }, WORD_LENGTH * 300 + 200);
            }

            currentRow++;
            currentCol = 0;
            currentGuess = '';
        }

        function evaluateGuess(guess, target) {
            const result = Array(WORD_LENGTH).fill('absent');
            const targetArr = target.split('');
            const guessArr = guess.split('');
            const used = Array(WORD_LENGTH).fill(false);

            // First pass: correct positions
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessArr[i] === targetArr[i]) {
                    result[i] = 'correct';
                    used[i] = true;
                }
            }

            // Second pass: present but wrong position
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (result[i] === 'correct') continue;
                for (let j = 0; j < WORD_LENGTH; j++) {
                    if (!used[j] && guessArr[i] === targetArr[j]) {
                        result[i] = 'present';
                        used[j] = true;
                        break;
                    }
                }
            }

            return result;
        }

        function revealRow(row, result) {
            const guess = guesses[guesses.length - 1].word;
            for (let i = 0; i < WORD_LENGTH; i++) {
                const tile = document.getElementById(`tile-${row}-${i}`);
                setTimeout(() => {
                    tile.classList.add('reveal', result[i]);
                }, i * 300);
            }

            // Update keyboard after all reveals
            setTimeout(() => {
                for (let i = 0; i < WORD_LENGTH; i++) {
                    const letter = guess[i];
                    const state = result[i];
                    const priority = { 'correct': 3, 'present': 2, 'absent': 1 };
                    const current = keyStates[letter];
                    if (!current || priority[state] > priority[current]) {
                        keyStates[letter] = state;
                    }
                }
                buildKeyboard();
            }, WORD_LENGTH * 300);
        }

        function shakeRow(row) {
            const rowEl = document.getElementById(`row-${row}`);
            rowEl.classList.add('shake');
            setTimeout(() => rowEl.classList.remove('shake'), 500);
        }

        // ====== MESSAGES ======
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message-text visible ${type || ''}`;
            if (type === 'error') {
                setTimeout(hideMessage, 2000);
            }
        }

        function hideMessage() {
            messageEl.className = 'message-text';
        }

        // ====== RESULT ======
        function showResult() {
            resultOverlay.classList.add('active');
            document.getElementById('result-icon').textContent = gameWon ? '🎉' : '😢';
            const title = document.getElementById('result-title');
            title.textContent = gameWon ? 'Parabens!' : 'Que pena!';
            title.className = gameWon ? 'win-text' : 'lose-text';
            document.getElementById('result-message').textContent = gameWon
                ? `Voce acertou em ${guesses.length}/${MAX_ATTEMPTS} tentativas!`
                : `A palavra era: ${targetWord}`;

            document.getElementById('share-preview').textContent = generateShareText();

            // Hide share button for random games
            document.getElementById('share-btn').style.display = isDaily ? 'block' : 'none';
        }

        function closeResult() {
            resultOverlay.classList.remove('active');
        }

        function generateShareText() {
            const dateStr = isDaily ? getTodayString() : 'Livre';
            const attempts = gameWon ? `${guesses.length}/${MAX_ATTEMPTS}` : `X/${MAX_ATTEMPTS}`;
            let text = `🔤 Palavritas ${dateStr}\n\n${attempts} tentativas\n\n`;

            for (const g of guesses) {
                let line = '';
                for (const r of g.result) {
                    if (r === 'correct') line += '🟩';
                    else if (r === 'present') line += '🟨';
                    else line += '⬛';
                }
                text += line + '\n';
            }

            return text.trim();
        }

        function shareResult() {
            const text = generateShareText();
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    const toast = document.getElementById('copied-toast');
                    toast.classList.add('visible');
                    setTimeout(() => toast.classList.remove('visible'), 2000);
                });
            }
        }

        // ====== KEYBOARD INPUT ======
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;

            const key = e.key.toUpperCase();
            if (key === 'ENTER') {
                handleKey('ENTER');
            } else if (key === 'BACKSPACE') {
                handleKey('⌫');
            } else if (/^[A-Z]$/.test(key)) {
                handleKey(key);
            }
        });

        // ====== START ======
        initGame();
    </script>
</body>
</html>
